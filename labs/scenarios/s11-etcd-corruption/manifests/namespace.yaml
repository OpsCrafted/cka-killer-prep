apiVersion: v1
kind: Namespace
metadata:
  name: critical-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: critical-service
  namespace: critical-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: critical-service
  template:
    metadata:
      labels:
        app: critical-service
    spec:
      containers:
      - name: app
        image: nginx:1.21
