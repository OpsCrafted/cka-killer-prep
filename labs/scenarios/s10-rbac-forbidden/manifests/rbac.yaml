apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-reader
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-test
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbac-test
  template:
    metadata:
      labels:
        app: rbac-test
    spec:
      serviceAccountName: app-reader
      containers:
      - name: app
        image: alpine:latest
        command: ["sh", "-c", "while true; do kubectl get configmaps -A 2>&1 | head -5; sleep 5; done"]
