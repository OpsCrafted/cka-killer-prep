apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
      - name: app
        image: busybox:1.28
        command: ["sh", "-c", "[ -f /etc/app/app.conf ] && sleep 3600 || exit 1"]
        volumeMounts:
        - name: config
          mountPath: /etc/app
      volumes:
      - name: config
        configMap:
          name: app-config
